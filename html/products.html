<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - TechStore</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <div class="logo">
                    <div class="logo-img"><img src="images/logo.png" alt="Logo" style="width: 100%; height: 100%; border-radius: 50%;" /></div>
                    <span class="logo-text">BeyondGadget</span>
                </div>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="about.html" class="nav-link">About</a></li>
                    <li><a href="products.html" class="nav-link active">Products</a></li>
                    <li><a href="contact.html" class="nav-link">Contact Us</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <div class="nav-icons">
                    <button class="icon-btn" id="search-icon" title="Search">🔍</button>
                    <button class="icon-btn" id="checkout-icon" title="Checkout">
                        🛒 <span id="cart-count">0</span>
                    </button>
                    <button class="icon-btn" id="menu-icon" title="Menu">☰</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <header>
            <h1>Our Products</h1>
            <p>Explore our extensive range of cutting-edge technology</p>
        </header>

        <!-- Category Filter -->
        <div class="filter-section">
            <button class="filter-btn active" data-category="all">All Products</button>
            <button class="filter-btn" data-category="smartphone">Smartphones</button>
            <button class="filter-btn" data-category="laptop">Laptops</button>
            <button class="filter-btn" data-category="tablet">Tablets</button>
            <button class="filter-btn" data-category="audio">Audio</button>
        </div>

        <!-- Products Grid -->
        <div class="products-grid" id="products-grid">
            <!-- Products will be dynamically loaded here -->
        </div>

        <!-- Cart Section -->
        <div class="cart-section" id="cart-section">
            <h2>Shopping Cart</h2>
            <div id="cart-items"></div>
            <div class="cart-total">
                <strong>Total: R<span id="cart-total">0</span></strong>
            </div>
            <div class="cart-actions">
                <button id="clear-cart-btn" class="clear-cart-btn">Clear Cart</button>
                <button id="checkout-cart-btn" class="checkout-cart-btn">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-menu" class="mobile-menu">
        <div class="mobile-menu-content">
            <button class="close-menu" id="close-menu">×</button>
            <ul class="mobile-nav-menu">
                <li><a href="index.html" class="mobile-nav-link">Home</a></li>
                <li><a href="about.html" class="mobile-nav-link">About</a></li>
                <li><a href="products.html" class="mobile-nav-link">Products</a></li>
                <li><a href="contact.html" class="mobile-nav-link">Contact Us</a></li>
            </ul>
        </div>
    </div>

    

    <script src="products-script.js"></script>
</body>
</html>
